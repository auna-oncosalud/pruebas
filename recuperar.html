<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña — Portal Asesores</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --blue-900: #001a4d;
            --blue-800: #002d72;
            --blue-600: #005fcc;
            --blue-500: #007bc3;
            --blue-400: #00a9e0;
            --slate-900: #0f172a;
            --slate-500: #64748b;
            --slate-100: #f1f5f9;
            --success: #10b981;
            --error: #ef4444;
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, var(--blue-800), var(--blue-900));
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: white;
            overflow: hidden;
        }

        .decor {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
        }

        .c1 {
            width: 450px;
            height: 450px;
            background: var(--blue-600);
            top: -15%;
            left: -10%;
        }

        .c2 {
            width: 350px;
            height: 350px;
            background: var(--blue-400);
            bottom: -10%;
            right: -5%;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            padding: 48px 40px;
            border-radius: var(--radius-lg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 440px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            animation: fadeInScale 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .logo {
            width: 110px;
            margin-bottom: 32px;
        }

        h2 {
            color: var(--blue-900);
            margin: 0 0 10px 0;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: var(--slate-500);
            font-size: 0.95rem;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .field-group {
            text-align: left;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--blue-900);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrap svg.icon-main {
            position: absolute;
            left: 14px;
            width: 20px;
            height: 20px;
            color: var(--slate-500);
            pointer-events: none;
        }

        input {
            width: 100%;
            padding: 14px 46px 14px 46px;
            border: 2px solid var(--slate-100);
            border-radius: var(--radius-md);
            box-sizing: border-box;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.2s ease;
            color: var(--slate-900);
        }

        input:focus {
            border-color: var(--blue-500);
            background: white;
            box-shadow: 0 0 0 4px rgba(0, 123, 195, 0.1);
        }

        .toggle-btn {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: var(--slate-500);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .toggle-btn:hover {
            color: var(--blue-600);
            background: var(--slate-100);
        }

        .validation-hint {
            font-size: 0.8rem;
            margin-top: 8px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 18px;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--blue-600), var(--blue-800));
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            font-family: inherit;
            margin-top: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            filter: brightness(1.1);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: var(--slate-500);
        }

        #status-message {
            margin-top: 24px;
            padding: 16px;
            border-radius: var(--radius-md);
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="decor">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
    </div>

    <div class="card">
        <img src="https://res.cloudinary.com/dwxiuavqd/image/upload/v1774998253/468951353_1098106335437147_8489372296479282912_n_insezr.jpg"
            alt="Auna" class="logo">

        <h2>Nueva Contraseña</h2>
        <p class="subtitle">Ingresa tu nueva clave de acceso para asegurar tu cuenta.</p>

        <div class="field-group">
            <label for="nueva-clave">Nueva Contraseña</label>
            <div class="input-wrap">
                <svg class="icon-main" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
                <input type="password" id="nueva-clave" placeholder="••••••••" oninput="validarInputs()">
                <button type="button" class="toggle-btn" onclick="toggleVisibility('nueva-clave')">
                    <svg style="width:18px;height:18px" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="field-group">
            <label for="confirmar-clave">Confirmar Contraseña</label>
            <div class="input-wrap">
                <svg class="icon-main" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                    <polyline points="22 4 12 14.01 9 11.01" />
                </svg>
                <input type="password" id="confirmar-clave" placeholder="••••••••" oninput="validarInputs()">
                <button type="button" class="toggle-btn" onclick="toggleVisibility('confirmar-clave')">
                    <svg style="width:18px;height:18px" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </button>
            </div>
            <div id="match-msg" class="validation-hint"></div>
        </div>

        <button id="btn-guardar" class="btn-submit" onclick="actualizarClave()" disabled>
            <span id="btn-text">Actualizar Contraseña</span>
            <div id="btn-loader" class="spinner" style="display: none;"></div>
        </button>

        <div id="status-message"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yemdfadeczjrvxptyerl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InllbWRmYWRlY3pqcnZ4cHR5ZXJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NzU1OTMsImV4cCI6MjA4NzQ1MTU5M30.MrWtFAhekPyuEUs0zgT3VSqYgPwd9o25lMdCuhxqwg4';

        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');
        const refreshToken = params.get('refresh_token');

        if (accessToken && refreshToken) {
            clienteSupabase.auth.setSession({
                access_token: accessToken,
                refresh_token: refreshToken
            });
            window.location.hash = '';
        }

        function toggleVisibility(id) {
            const el = document.getElementById(id);
            el.type = el.type === "password" ? "text" : "password";
        }

        function validarInputs() {
            const pass1 = document.getElementById('nueva-clave').value;
            const pass2 = document.getElementById('confirmar-clave').value;
            const msg = document.getElementById('match-msg');
            const btn = document.getElementById('btn-guardar');

            if (pass2.length === 0) {
                msg.textContent = "";
                btn.disabled = true;
                return;
            }

            if (pass1 === pass2 && pass1.length >= 6) {
                msg.innerHTML = '✅ Las contraseñas coinciden';
                msg.style.color = "var(--success)";
                btn.disabled = false;
            } else {
                msg.innerHTML = '❌ ' + (pass1.length < 6 ? 'Mínimo 6 caracteres' : 'No coinciden');
                msg.style.color = "var(--error)";
                btn.disabled = true;
            }
        }

        async function actualizarClave() {
            const nuevaClave = document.getElementById('nueva-clave').value;
            const statusDiv = document.getElementById('status-message');
            const btn = document.getElementById('btn-guardar');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');

            btn.disabled = true;
            btnText.textContent = 'Actualizando...';
            btnLoader.style.display = 'block';

            try {
                const { data: { session } } = await clienteSupabase.auth.getSession();
                if (!session) throw new Error("Sesión inválida. Solicita un nuevo enlace.");

                const { error } = await clienteSupabase.auth.updateUser({ password: nuevaClave });
                if (error) throw error;

                statusDiv.style.display = 'block';
                statusDiv.style.background = '#ecfdf5';
                statusDiv.style.color = '#047857';
                statusDiv.textContent = '✅ ¡Contraseña actualizada! Redirigiendo...';

                await clienteSupabase.auth.signOut();
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);

            } catch (err) {
                statusDiv.style.display = 'block';
                statusDiv.style.background = '#fef2f2';
                statusDiv.style.color = '#b91c1c';
                statusDiv.textContent = '❌ ' + err.message;
                btn.disabled = false;
                btnText.textContent = 'Actualizar Contraseña';
                btnLoader.style.display = 'none';
            }
        }
    </script>
</body>

</html>
